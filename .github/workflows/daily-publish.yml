name: Lesson Publish (3x/week)

on:
  schedule:
    # Runs Mon/Wed/Fri at 13:00 UTC -- a 3-day-a-week reading cadence, not a
    # literal calendar deadline. The script also guards against publishing
    # twice in one day via staging/.last_published, so manual re-runs are safe.
    - cron: "0 13 * * 1,3,5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish next staged lesson
        id: publish
        run: python3 scripts/publish_next_day.py

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add days/ staging/ index.html plan.md
          git commit -m "Publish Day ${{ steps.publish.outputs.day_num }}: ${{ steps.publish.outputs.title }}"

          # main moves often (manual pushes can land between checkout and push),
          # so rebase onto the latest remote tip and retry a few times instead
          # of failing on a non-fast-forward push.
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) -- rebasing onto latest origin/main and retrying"
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1
